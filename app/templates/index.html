<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Economic Policy Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
        }

        .left-col h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .left-col p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: 400;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #38bdf8;
        }

        button:active {
            transform: translateY(0);
        }

        /* Results Section */
        .right-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .results-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0.5;
            transition: all 0.5s ease;
        }

        .results-card.active {
            opacity: 1;
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .metric {
            margin-bottom: 1.5rem;
        }

        .metric-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: #f8fafc;
        }

        .metric-value span {
            font-size: 1.2rem;
            color: #64748b;
        }

        .recommendation {
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rec-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #e2e8f0;
            font-weight: 300;
        }

        #loading {
            display: none;
            text-align: center;
            color: #38bdf8;
            margin-top: 1rem;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Input Form -->
        <div class="left-col">
            <h1>Economic Policy Simulator</h1>
            <p>Adjust the macroeconomic indicators below to predict future inflation, unemployment, and receive AI-driven policy recommendations.</p>
            
            <form id="simForm">
                <div class="input-group">
                    <label for="interest_rate">Interest Rate (%)</label>
                    <input type="number" step="0.1" id="interest_rate" name="interest_rate" value="5.5" required>
                </div>
                
                <div class="input-group">
                    <label for="gov_spending">Government Spending (B$)</label>
                    <input type="number" step="10" id="gov_spending" name="gov_spending" value="500" required>
                </div>
                
                <div class="input-group">
                    <label for="tax_rate">Tax Rate (%)</label>
                    <input type="number" step="0.1" id="tax_rate" name="tax_rate" value="25.0" required>
                </div>

                <button type="submit">Run Simulation</button>
            </form>
            <div id="loading">Running ML prediction...</div>
            <div id="error" class="error-message"></div>
        </div>

        <!-- Output Dashboard -->
        <div class="right-col">
            <div class="results-card" id="resultsCard">
                <div class="metric">
                    <div class="metric-title">Predicted Inflation</div>
                    <div class="metric-value" id="resInflation">--<span>%</span></div>
                </div>
                
                <div class="metric">
                    <div class="metric-title">Predicted Unemployment</div>
                    <div class="metric-value" id="resUnemployment">--<span>%</span></div>
                </div>

                <div class="recommendation">
                    <div class="metric-title">Policy Recommendation</div>
                    <div class="rec-text" id="resRec">Awaiting simulation data...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('simForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.querySelector('button');
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultsCard = document.getElementById('resultsCard');
            
            // UI Reset
            btn.disabled = true;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            resultsCard.classList.remove('active');
            
            const payload = {
                interest_rate: parseFloat(document.getElementById('interest_rate').value),
                gov_spending: parseFloat(document.getElementById('gov_spending').value),
                tax_rate: parseFloat(document.getElementById('tax_rate').value)
            };

            try {
                const response = await fetch('/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Server error occurred');
                }

                // Update UI with results
                document.getElementById('resInflation').innerHTML = `${data.predictions.inflation_percent}<span>%</span>`;
                document.getElementById('resUnemployment').innerHTML = `${data.predictions.unemployment_percent}<span>%</span>`;
                document.getElementById('resRec').innerText = data.policy_recommendation;
                
                resultsCard.classList.add('active');

            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
